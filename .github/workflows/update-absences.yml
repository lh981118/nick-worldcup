name: Player absences update (manual)

# Manual only. Run this from GitHub Actions when you want to refresh player
# absences. Any committed change to src/data/* can still trigger Netlify
# auto-deploy.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Scrape all 48 teams
        run: npm run fetch-absences -- --all

      - name: Commit if changed
        run: |
          git config user.name 'mundial2026-bot'
          git config user.email 'bot@users.noreply.github.com'
          if [[ -n "$(git status --porcelain src/data/absences.json)" ]]; then
            git add src/data/absences.json
            git commit -m "chore(absences): daily refresh $(date -u +%Y-%m-%d)"
            git push
          else
            echo 'No changes to absences.json - skipping commit.'
          fi
