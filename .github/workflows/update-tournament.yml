name: Live tournament update (manual)

# Manual only. Run this from GitHub Actions when you want to refresh match
# results, cards, suspensions, Monte Carlo snapshots, and prediction audit.
# Any committed change to src/data/* can still trigger Netlify auto-deploy.

on:
  workflow_dispatch:
    inputs:
      range:
        description: 'Date range YYYYMMDD..YYYYMMDD (defaults to today)'
        required: false

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Gate to tournament window
        id: gate
        run: |
          NOW=$(date -u +%Y-%m-%d)
          if [[ "$NOW" < "2026-06-11" || "$NOW" > "2026-07-19" ]]; then
            echo "outside-window=true" >> "$GITHUB_OUTPUT"
            echo "Date $NOW outside 2026-06-11..2026-07-19 window - skipping."
          else
            echo "outside-window=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.outside-window == 'false'
        uses: actions/checkout@v4

      - if: steps.gate.outputs.outside-window == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - if: steps.gate.outputs.outside-window == 'false'
        run: npm ci

      - name: Fetch results
        if: steps.gate.outputs.outside-window == 'false'
        run: |
          RANGE="${{ github.event.inputs.range }}"
          if [[ -n "$RANGE" ]]; then
            npx tsx scripts/fetch-results.ts --range "$RANGE"
          else
            # Default: walk yesterday + today to catch overnight matches.
            YDAY=$(date -u -d 'yesterday' +%Y%m%d)
            TDAY=$(date -u +%Y%m%d)
            npx tsx scripts/fetch-results.ts --range "$YDAY..$TDAY"
          fi

      - name: Fetch cards + derive suspensions
        if: steps.gate.outputs.outside-window == 'false'
        run: npx tsx scripts/fetch-cards.ts --all || echo 'cards scrape failed (non-fatal - results still committed)'

      - name: Snapshot Monte Carlo
        if: steps.gate.outputs.outside-window == 'false'
        run: npx tsx scripts/snapshot-run.ts --n 50000

      - name: Update prediction audit
        if: steps.gate.outputs.outside-window == 'false'
        run: npx tsx scripts/update-prediction-audit.ts --n 20000

      - name: Commit if changed
        if: steps.gate.outputs.outside-window == 'false'
        run: |
          git config user.name 'mundial2026-bot'
          git config user.email 'bot@users.noreply.github.com'
          CHANGED=$(git status --porcelain src/data/tournament_state.json src/data/snapshots.json src/data/prediction_audit.json)
          if [[ -n "$CHANGED" ]]; then
            git add src/data/tournament_state.json src/data/snapshots.json src/data/prediction_audit.json
            git commit -m "chore(live): tournament update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo 'No changes - skipping commit.'
          fi
